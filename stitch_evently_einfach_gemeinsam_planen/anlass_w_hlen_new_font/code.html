<body class="bg-background text-on-background antialiased min-h-screen flex flex-col font-body-md text-body-md">

<button class="flex items-center text-on-surface-variant hover:text-primary transition-colors group">

</button>
<div class="font-headline-xl-mobile text-headline-xl-mobile text-primary font-bold">Eventique</div>
<button class="flex items-center text-on-surface-variant hover:text-primary transition-colors group">
<span class="font-label-md text-label-md hidden md:inline mr-2">Abbrechen</span>
<span class="material-symbols-outlined group-hover:rotate-90 transition-transform">close</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center px-container-padding-mobile md:px-container-padding-desktop pb-section-gap w-full max-w-[1440px] mx-auto">
<!-- Progress Wizard -->

<div class="flex justify-between items-center mb-2">

</div>
<div class="h-1 bg-surface-variant rounded-full overflow-hidden">

</div>
</div>
<!-- Title Section -->
<div class="text-center mb-16">
<h1 class="font-headline-xl-mobile md:font-headline-xl text-headline-xl-mobile md:text-headline-xl text-on-background mb-4">Was für ein Event planst du?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xl mx-auto">Wähle den passenden Anlass, um personalisierte Vorlagen und Empfehlungen zu erhalten.</p>
</div>
<!-- Bento Grid Selection -->
<div class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-gutter w-full max-w-4xl">
<!-- Card: Hochzeit -->
<button class="event-card group relative bg-surface flex flex-col items-center justify-center p-8 rounded-[24px] border border-outline-variant/30 shadow-[0px_10px_30px_rgba(45,45,45,0.04)] hover:border-[#F7F3F0] hover:shadow-[0px_15px_40px_rgba(45,45,45,0.08)] transition-all duration-300 ease-out focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 overflow-hidden">

</div>
</main>
<!-- Navigation shell suppressed due to linear/transactional intent (Wizard) -->
<script>
        // Simple micro-interaction for selecting a card
        document.querySelectorAll('.event-card').forEach(card => {
            card.addEventListener('click', function() {
                // Remove active state from all
                document.querySelectorAll('.event-card').forEach(c => {
                    c.classList.remove('ring-2', 'ring-primary', 'bg-surface-container-low');
                    c.querySelector('.absolute').classList.remove('opacity-100');
                });
                
                // Add active state to clicked
                this.classList.add('ring-2', 'ring-primary', 'bg-surface-container-low');
                this.querySelector('.absolute').classList.add('opacity-100');
                
                // Simulate transition to next step after brief delay
                setTimeout(() => {
                    const progressBar = document.querySelector('.step-indicator');
                    if(progressBar) progressBar.style.width = '50%';
                }, 400);
            });
        });
    </script>
